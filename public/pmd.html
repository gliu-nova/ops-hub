<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMD — Ops Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main>
    <header>
      <p class="back-link"><a href="/">← Ops Hub</a></p>
      <h1>prediction-market-divergence</h1>
      <p class="subtitle">Ingestion sources, market counts, and signal output</p>
    </header>

    <section class="card">
      <div class="row">
        <h2>Service status</h2>
        <div class="actions">
          <button id="refresh" type="button">Refresh</button>
        </div>
      </div>
      <div id="status" class="muted">Loading…</div>
    </section>

    <section class="card">
      <h2>Ingestion</h2>
      <div id="ingestion" class="muted">Loading…</div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <div id="output-summary" class="muted">Loading…</div>
      <div id="opportunities" class="item-list muted">Loading…</div>
      <h3 class="section-subhead">Latest signals</h3>
      <div id="signals" class="item-list muted">Loading…</div>
    </section>
  </main>
  <script>
    function formatRelativeTime(iso) {
      if (!iso) return 'never';
      const then = new Date(iso).getTime();
      if (Number.isNaN(then)) return iso;
      const minutes = Math.floor((Date.now() - then) / 60000);
      if (minutes < 1) return 'just now';
      if (minutes === 1) return '1 minute ago';
      if (minutes < 60) return `${minutes} minutes ago`;
      const hours = Math.floor(minutes / 60);
      if (hours === 1) return '1 hour ago';
      if (hours < 48) return `${hours} hours ago`;
      const days = Math.floor(hours / 24);
      return days === 1 ? '1 day ago' : `${days} days ago`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function sourceClass(value) {
      return value === 'ok' || value === 'configured' ? 'ok' : 'bad';
    }

    function renderStatus(health) {
      if (!health || health.status === 'error') {
        document.getElementById('status').innerHTML = `<p class="bad">Could not reach PMD: ${escapeHtml(health?.error || 'unknown')}</p>`;
        return;
      }
      const errorLine = health.last_error
        ? `<div class="bad"><strong>Last error:</strong> ${escapeHtml(health.last_error)}</div>`
        : '';
      document.getElementById('status').innerHTML = `
        <div class="grid">
          <div><strong>Status:</strong> <span class="${health.status === 'ok' ? 'ok' : 'warn'}">${escapeHtml(health.status)}</span></div>
          <div><strong>Last poll:</strong> ${formatRelativeTime(health.last_poll_at)} <span class="muted">(${health.last_poll_at ? new Date(health.last_poll_at).toLocaleString() : '—'})</span></div>
          ${errorLine}
          <div class="muted">Updated ${new Date().toLocaleString()}</div>
        </div>
      `;
    }

    function renderIngestion(health) {
      const el = document.getElementById('ingestion');
      if (!health || health.status === 'error') {
        el.innerHTML = '<p class="bad">No ingestion data.</p>';
        return;
      }
      const ingestion = health.ingestion || {
        total_markets: health.markets_tracked,
        kalshi_markets: 0,
        polymarket_markets: 0,
        matched_pairs: 0,
      };
      const sources = health.sources || {};
      const rows = Object.entries(sources).map(([key, value]) => `
        <tr>
          <td>${escapeHtml(key.replaceAll('_', ' '))}</td>
          <td class="${sourceClass(value)}">${escapeHtml(value)}</td>
        </tr>
      `).join('');
      el.innerHTML = `
        <div class="stat-grid">
          <div class="stat"><span class="stat-label">Total markets</span><span class="stat-value">${ingestion.total_markets.toLocaleString()}</span></div>
          <div class="stat"><span class="stat-label">Kalshi</span><span class="stat-value">${ingestion.kalshi_markets.toLocaleString()}</span></div>
          <div class="stat"><span class="stat-label">Polymarket</span><span class="stat-value">${ingestion.polymarket_markets.toLocaleString()}</span></div>
          <div class="stat"><span class="stat-label">Matched pairs</span><span class="stat-value">${ingestion.matched_pairs.toLocaleString()}</span></div>
        </div>
        <table class="data-table">
          <thead><tr><th>Source</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${ingestion.kalshi_markets === 0 && ingestion.polymarket_markets === 0 && ingestion.total_markets > 0
          ? '<p class="muted table-note">Per-venue counts will appear after the next PMD poll.</p>'
          : ''}
      `;
    }

    function renderSignalItem(item) {
      const b = item.market_b;
      const venueLine = b
        ? `${item.market_a.venue} ${(item.market_a.probability * 100).toFixed(0)}% · ${b.venue} ${(b.probability * 100).toFixed(0)}% · gap ${item.difference_pct_points} pts`
        : `${item.market_a.venue} ${(item.market_a.probability * 100).toFixed(0)}%`;
      const active = item.is_active ? '<span class="badge badge-ok">active</span>' : '<span class="badge badge-warn">inactive</span>';
      return `
        <article class="item-card">
          <div class="item-head">
            <h3>${escapeHtml(item.title)}</h3>
            <span class="item-meta">score ${item.score} · ${active}</span>
          </div>
          <p>${escapeHtml(venueLine)}</p>
          <p class="muted">${formatRelativeTime(item.created_at)}</p>
        </article>
      `;
    }

    function renderOutput(health, opportunities, signals) {
      const summary = health?.output || {
        active_opportunities: health?.active_opportunities ?? 0,
        signals_total: health?.signals_total ?? 0,
        last_opportunities_found: 0,
      };
      document.getElementById('output-summary').innerHTML = `
        <div class="stat-grid">
          <div class="stat"><span class="stat-label">Active opportunities</span><span class="stat-value">${summary.active_opportunities.toLocaleString()}</span></div>
          <div class="stat"><span class="stat-label">Total signals</span><span class="stat-value">${summary.signals_total.toLocaleString()}</span></div>
          <div class="stat"><span class="stat-label">Found last poll</span><span class="stat-value">${summary.last_opportunities_found.toLocaleString()}</span></div>
        </div>
      `;

      const oppEl = document.getElementById('opportunities');
      if (opportunities?.status === 'error') {
        oppEl.innerHTML = `<p class="bad">Could not load opportunities: ${escapeHtml(opportunities.error)}</p>`;
      } else if (!opportunities?.opportunities?.length) {
        oppEl.innerHTML = '<p class="muted">No active opportunities right now.</p>';
      } else {
        oppEl.innerHTML = `<h3 class="section-subhead">Active opportunities (${opportunities.count})</h3>` +
          opportunities.opportunities.map(renderSignalItem).join('');
      }

      const sigEl = document.getElementById('signals');
      if (signals?.status === 'error') {
        sigEl.innerHTML = `<p class="bad">Could not load signals: ${escapeHtml(signals.error)}</p>`;
      } else if (!signals?.signals?.length) {
        sigEl.innerHTML = '<p class="muted">No signals stored yet.</p>';
      } else {
        sigEl.innerHTML = signals.signals.map(renderSignalItem).join('');
      }
    }

    async function load() {
      const res = await fetch('/api/pmd');
      const data = await res.json();
      renderStatus(data.health);
      renderIngestion(data.health);
      renderOutput(data.health, data.opportunities, data.signals);
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
